# Triggering new deploy after unlocking execution policy
name: ArcusAI CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Info
        shell: powershell
        run: |
          pwd
          dir
          dir quick-note

      - name: Build Admin Panel
        shell: powershell
        run: |
          cd quick-note/admin-panel
          npm install
          npm run build

      - name: Deploy Files
        shell: powershell
        run: |
          $targetDir = "C:/inetpub/arcusAI"
          
          # Podstawowe foldery
          if (!(Test-Path "$targetDir")) { New-Item -ItemType Directory -Force -Path "$targetDir" }
          if (!(Test-Path "$targetDir/backend")) { New-Item -ItemType Directory -Force -Path "$targetDir/backend" }
          if (!(Test-Path "$targetDir/admin-panel/dist")) { New-Item -ItemType Directory -Force -Path "$targetDir/admin-panel/dist" }

          # 1. Backend
          Copy-Item -Path "quick-note/backend/main.py" -Destination "$targetDir/backend/main.py" -Force
          
          # 2. Admin Panel
          Remove-Item -Path "$targetDir/admin-panel/dist/*" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "quick-note/admin-panel/dist/*" -Destination "$targetDir/admin-panel/dist" -Recurse -Force
          
          Write-Host "Deployment done."

      - name: Restart Backend
        shell: powershell
        run: |
          # Kill python processes
          $procs = Get-Process python -ErrorAction SilentlyContinue 
          if ($procs) { $procs | Stop-Process -Force }
          
          # Run bat
          Start-Process -FilePath "C:/inetpub/arcusAI/backend/run_windows.bat" -WorkingDirectory "C:/inetpub/arcusAI/backend" -WindowStyle Hidden
          Write-Host "Restarted."
